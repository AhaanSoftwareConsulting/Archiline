<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Blogs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Raleway:wght@700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        /* GRID */
        .blog-row {
            max-width: 1380px;
            margin: 0 auto;
        }

        /* FIX bootstrap negative margins */
        .blog-row .row {
            margin-left: 0;
            margin-right: 0;
        }

        /* CARD */
        .blog-card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #1C1C1C;
            overflow: hidden;
            transition: 0.3s ease;
            height: 100%;
            padding: 8px;
            display: flex;
            flex-direction: column;
        }

        /* IMAGE */
        .blog-image {
            width: 100%;
            height: 210px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        /* CONTENT */
        .blog-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* MIN READ */
        .blog-read {
            font-size: 14px;
            font-weight: 700;
            color: #00000066;
            margin-bottom: 8px;
        }

        /* TITLE */
        .blog-title {
            font-family: 'Raleway', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1C1C1C;
            margin-bottom: 8px;
        }

        /* DESC */
        .blog-desc {
            font-size: 16px;
            font-weight: 400;
            color: #333333;
            line-height: 1.6;
            margin-bottom: 14px;
            flex-grow: 1;
        }

        /* READ MORE */
        .blog-link {
            margin-top: auto;
            font-size: 16px;
            font-weight: 700;
            color: #1C1C1C;
            text-decoration: none;
            position: relative;
            display: inline-flex;
            /* safer than fit-content */
            align-self: flex-start;
            /* prevents stretch overflow */
        }

        .blog-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -3px;
            width: 0%;
            height: 2px;
            background: #1C1C1C;
            transition: 0.3s ease;
        }

        .blog-link:hover::after {
            width: 100%;
        }

        /* MOBILE */
        @media (max-width: 767px) {
            body {
                padding: 30px 15px;
            }
        }
    </style>
</head>

<body>

    <div class="container blog-row">
        <div class="row g-4" id="blogContainer">
            <!-- Dynamic -->
        </div>
    </div>

    <script>
        const API_URL = "https://inunity.ahaanmedia.com/wp-json/wp/v2/posts?_embed&per_page=3";

        fetch(API_URL)
            .then(res => res.json())
            .then(posts => {
                const container = document.getElementById("blogContainer");
                container.innerHTML = "";

                posts.forEach(post => {
                    const title = post.title.rendered;
                    const excerpt = post.excerpt.rendered.replace(/<[^>]*>/g, '').slice(0, 120) + "...";
                    const link = post.link;

                    // Featured Image
                    let image = "";
                    if (post._embedded && post._embedded["wp:featuredmedia"]) {
                        image = post._embedded["wp:featuredmedia"][0].source_url;
                    }

                    // Calculate read time
                    const words = post.content.rendered.replace(/<[^>]*>/g, '').split(" ").length;
                    const minRead = Math.max(1, Math.ceil(words / 200));

                    const card = `
                        <div class="col-lg-4 col-md-6">
                          <div class="blog-card">
                            ${image ? `<img src="${image}" class="blog-image">` : ""}
                            <div class="blog-content">
                              <div class="blog-read">${minRead} min read</div>
                              <div class="blog-title">${title}</div>
                              <div class="blog-desc">${excerpt}</div>
                              <a href="${link}" target="_blank" class="blog-link">
                                READ MORE
                              </a>
                            </div>
                          </div>
                        </div>
                    `;

                    container.insertAdjacentHTML("beforeend", card);
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById("blogContainer").innerHTML = "Failed to load blogs.";
            });
    </script>

</body>

</html>
